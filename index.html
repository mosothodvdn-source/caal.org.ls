<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>CAAL - Clinical Anaesthetists Association of Lesotho</title>

<style>

/* ===== GENERAL ===== */
body, html {
  margin: 0;
  padding: 0;
  font-family: Arial, sans-serif;
}

/* ===== HEADER ===== */
.header {
  display: flex;
  align-items: center;
  padding: 10px 20px;
  background-color: #003366;
  color: white;
}

.logo {
  height: 60px;
  margin-right: 15px;
}

/* ===== NAVBAR ===== */
nav {
  background-color: #0055a5;
}

nav ul {
  list-style: none;
  margin: 0;
  padding: 0;
  display: flex;
}

nav ul li {
  padding: 15px;
}

nav ul li a {
  color: white;
  text-decoration: none;
  font-weight: bold;
}

nav ul li:hover {
  background-color: #003366;
}

/* ===== SLIDESHOW ===== */
.slideshow-container {
  position: relative;
  width: 100%;
  height: 100vh;
  overflow: hidden;
}

.slide {
  display: none;
}

.slide img {
  width: 100%;
  height: 100vh;
  object-fit: cover;
}

/* Optional overlay text */
.overlay {
  position: absolute;
  bottom: 30px;
  left: 30px;
  color: white;
  background: rgba(0,0,0,0.5);
  padding: 10px 20px;
  border-radius: 5px;
  font-size: 20px;
}

</style>
</head>

<body>

<!-- ===== HEADER ===== -->
<header class="header">
  <img src="images/logo.png" alt="CAAL Logo" class="logo">
  <h1>Clinical Anaesthetists Association of Lesotho (CAAL)</h1>
</header>

<!-- ===== NAVIGATION ===== -->
<nav>
  <ul>
    <li><a href="index.html">Home</a></li>
    <li><a href="about.html">About</a></li>
    <li><a href="services.html">Services</a></li>
    <li><a href="contact.html">Contact</a></li>
  </ul>
</nav>

<!-- ===== SLIDESHOW (HOME CONTENT ONLY) ===== -->
<div class="slideshow-container">

  <div class="slide fade">
    <img src="images/announce.jpg" alt="Announce">
    <div class="overlay">Announcements</div>
  </div>

  <div class="slide fade">
    <img src="images/announcement.jpg" alt="Announcement">
    <div class="overlay">Latest Updates</div>
  </div>

  <div class="slide fade">
    <img src="images/picture.jpg" alt="Picture">
  </div>

  <div class="slide fade">
    <img src="images/picture1.jpg" alt="Picture 1">
  </div>

  <div class="slide fade">
    <img src="images/photo.jpg" alt="Photo">
  </div>

</div>

<!-- ===== JAVASCRIPT ===== -->
<script>
let slideIndex = 0;
showSlides();

function showSlides() {
  let slides = document.getElementsByClassName("slide");

  for (let i = 0; i < slides.length; i++) {
    slides[i].style.display = "none";
  }

  slideIndex++;
  if (slideIndex > slides.length) { slideIndex = 1 }

  slides[slideIndex - 1].style.display = "block";

  setTimeout(showSlides, 3000); // 3 seconds
}
</script>

</body>
</html>
